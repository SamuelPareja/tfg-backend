services:
  backend:
    build: ./backend
    container_name: aquinielator-backend
    ports:
      - "8000:8000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}

  frontend:
    build: ./frontend
    container_name: aquinielator-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend